services:
  db:
    image: postgres:18-alpine
    container_name: scouthub-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - scouthub-db-data:/var/lib/postgresql/data

  migrations:
    build:
      context: .
      dockerfile: docker/migrations/Dockerfile
    container_name: scouthub-migrations
    depends_on:
      db:
        condition: service_healthy
    environment:
      CONNECTION_STRING: "Host=db;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"

  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: scouthub-api
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"

  client:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: scouthub-client

  nginx:
    image: nginx:alpine
    container_name: scouthub-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - client

volumes:
  scouthub-db-data:
